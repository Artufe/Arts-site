<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Arthur Buikis — ab.</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:      oklch(96% 0.004 100);
  --surface: oklch(100% 0 0);
  --fg:      oklch(15% 0.02 100);
  --muted:   oklch(40% 0.02 100);
  --border:  oklch(15% 0.02 100);
  --accent:  oklch(55% 0.14 190);
  --scan:    oklch(0% 0 0 / 0.04);
  --font-display: 'Times New Roman', 'Iowan Old Style', Georgia, serif;
  --font-body:    ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', Menlo, monospace;
  --dur: 250ms;
  --ease: cubic-bezier(0.22,1,0.36,1);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:      oklch(10% 0.006 100);
    --surface: oklch(7% 0.006 100);
    --fg:      oklch(92% 0.004 100);
    --muted:   oklch(60% 0.006 100);
    --border:  oklch(92% 0.004 100);
    --accent:  oklch(65% 0.12 190);
    --scan:    oklch(100% 0 0 / 0.025);
  }
}
html{font-size:16px}
body{
  font-family:var(--font-body);
  background:var(--bg);color:var(--fg);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);
  pointer-events:none;z-index:9999;
}
::selection{background:var(--accent);color:var(--bg)}

/* progress bar */
#progress{
  position:fixed;top:0;left:0;right:0;height:2px;z-index:10000;
  background:transparent;
  pointer-events:none;
}
#progress .bar{
  height:100%;width:0%;
  background:var(--accent);
  transition:width 400ms var(--ease);
}

/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border)}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* layout */
.l-wrap{max-width:1200px;margin:0 auto;padding:0 28px}
.l-asym{display:grid;grid-template-columns:3fr 1fr;gap:56px}
@media(max-width:768px){.l-asym{grid-template-columns:1fr;gap:24px}.l-wrap{padding:0 16px}}

/* header */
.header{
  position:sticky;top:0;z-index:100;
  background:color-mix(in srgb,var(--bg) 96%,transparent);
  backdrop-filter:blur(8px);
  border-bottom:1.5px solid var(--border);
  padding:14px 0;
}
.header .l-wrap{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{
  font-family:var(--font-display);font-size:26px;font-weight:400;line-height:1;
  letter-spacing:-0.02em;color:var(--fg);text-decoration:none;
  display:flex;align-items:center;gap:10px;
}
.brand:hover{color:var(--accent)}
.brand .accent{color:var(--accent)}

/* signal bars */
.signal{display:inline-flex;align-items:end;gap:2px;height:14px}
.signal span{
  display:block;width:3px;
  background:currentColor;border-radius:0;
  transition:height var(--dur);
}
.signal span:nth-child(1){height:6px;animation:signal 1.6s ease-in-out infinite 0s}
.signal span:nth-child(2){height:9px;animation:signal 1.6s ease-in-out infinite 0.2s}
.signal span:nth-child(3){height:13px;animation:signal 1.6s ease-in-out infinite 0.4s}
@keyframes signal{
  0%,100%{opacity:.5;transform:scaleY(1)}
  50%{opacity:1;transform:scaleY(1.15)}
}

.nav{display:flex;gap:2px;flex-wrap:wrap}
.nav a{
  font-size:11.5px;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--muted);text-decoration:none;padding:6px 10px;
  border:1.5px solid transparent;transition:var(--dur) var(--ease);
  position:relative;
}
.nav a::after{
  content:'';position:absolute;bottom:-1px;left:50%;right:50%;
  height:1.5px;background:var(--fg);
  transition:var(--dur) var(--ease);
}
.nav a:hover{color:var(--fg)}
.nav a:hover::after{left:10%;right:10%}
.nav a.active{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.nav a.active::after{display:none}

/* hamburger */
.hamburger{display:none;cursor:pointer;background:none;border:none;padding:4px;color:var(--fg)}
.hamburger span{display:block;width:20px;height:2px;background:currentColor;margin:4px 0;transition:var(--dur) var(--ease);border-radius:0}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

/* mobile nav overlay */
.mobile-nav{
  display:none;position:fixed;inset:0;top:57px;z-index:99;
  background:color-mix(in srgb,var(--bg) 97%,transparent);
  backdrop-filter:blur(20px);
  flex-direction:column;align-items:center;justify-content:center;gap:4px;
  animation:mobileNavIn 300ms var(--ease);
}
@keyframes mobileNavIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mobile-nav.open{display:flex}
.mobile-nav a{
  font-family:var(--font-display);font-size:clamp(28px,6vw,48px);
  color:var(--muted);text-decoration:none;letter-spacing:-0.03em;
  padding:8px 0;transition:var(--dur) var(--ease);
}
.mobile-nav a:hover,.mobile-nav a.active{color:var(--accent)}

/* pages */
.page{padding:40px 0 80px;min-height:60vh}

/* page transition */
.page-enter{animation:pageIn 400ms var(--ease) both}
.page-enter-out{animation:pageOut 250ms var(--ease) both}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}

/* stagger children */
.stagger>*{animation:staggerIn 400ms var(--ease) both}
.stagger>*:nth-child(1){animation-delay:0ms}
.stagger>*:nth-child(2){animation-delay:60ms}
.stagger>*:nth-child(3){animation-delay:120ms}
.stagger>*:nth-child(4){animation-delay:180ms}
.stagger>*:nth-child(5){animation-delay:240ms}
.stagger>*:nth-child(6){animation-delay:300ms}
.stagger>*:nth-child(7){animation-delay:360ms}
.stagger>*:nth-child(8){animation-delay:420ms}
@keyframes staggerIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* reveal observer */
.reveal{opacity:0;transform:translateY(20px);transition:opacity 500ms var(--ease),transform 500ms var(--ease)}
.reveal.vis{opacity:1;transform:translateY(0)}

/* typography */
h1{
  font-family:var(--font-display);
  font-size:clamp(48px,8vw,120px);
  font-weight:400;line-height:0.88;
  letter-spacing:-0.045em;
}
h2{
  font-family:var(--font-display);
  font-size:clamp(30px,4.5vw,56px);
  font-weight:400;line-height:1;
  letter-spacing:-0.035em;
  margin:0 0 20px;
}
h3{
  font-family:var(--font-display);
  font-size:22px;font-weight:400;
  letter-spacing:-0.02em;margin:0 0 10px;
}
.mono{font-family:var(--font-body);font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)}
.ch{color:var(--accent)}
.dim{color:var(--muted)}
.tnum{font-variant-numeric:tabular-nums}

/* typed text cursor */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.typed-cursor{color:var(--accent);animation:blink 1s step-end infinite;margin-left:2px}

/* command bar */
.cmd-bar{
  margin:28px 0 36px;
  border:1.5px solid var(--border);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  cursor:text;transition:var(--dur) var(--ease);
}
.cmd-bar:focus-within{border-color:var(--accent)}
.cmd-bar .prompt{color:var(--accent);font-size:13.5px;flex-shrink:0}
.cmd-bar .typed-text{flex:1;font-size:13.5px;min-height:1.4em;color:var(--fg)}
.cmd-bar .hint{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;white-space:nowrap;flex-shrink:0}

/* sections */
.section{margin-bottom:56px}
.section-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.section-header h2{flex:1;margin:0}
.section-header .count{font-size:11px;color:var(--muted);font-family:var(--font-body)}

/* cards */
.card{
  border:1.5px solid var(--border);
  padding:20px;margin-bottom:12px;
  transition:var(--dur) var(--ease);
}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card .meta{font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;font-family:var(--font-body)}
.card h3{margin-bottom:6px}
.card p{font-size:13.5px;color:var(--muted);margin-bottom:10px;line-height:1.6}
.card .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.card .tag{
  font-size:9.5px;text-transform:uppercase;letter-spacing:0.06em;
  padding:2px 7px;border:1.5px solid var(--border);color:var(--muted);
  transition:var(--dur) var(--ease);
}
.card:hover .tag{border-color:var(--accent);color:var(--accent)}

/* stat row */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1.5px;margin-bottom:40px;
  background:var(--border);
  border:1.5px solid var(--border);
}
.stat{
  background:var(--bg);padding:18px 12px;text-align:center;
  transition:var(--dur) var(--ease);
}
.stat:hover{background:color-mix(in srgb,var(--accent) 10%,var(--bg))}
.stat .num{
  font-family:var(--font-display);
  font-size:clamp(30px,3.5vw,44px);
  font-weight:400;letter-spacing:-0.03em;color:var(--accent);line-height:1;
  font-variant-numeric:tabular-nums;
}
.stat .num.counted::after{content:'';display:inline-block;width:0}
.stat .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-top:5px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}

/* timeline */
.tl{position:relative}
.tl::before{content:'';position:absolute;left:11px;top:4px;bottom:4px;width:1.5px;background:var(--border)}
.tl-item{position:relative;padding:0 0 22px 38px}
.tl-item::before{
  content:'';position:absolute;left:3px;top:5px;
  width:18px;height:18px;
  border:1.5px solid var(--border);background:var(--bg);
  transition:var(--dur) var(--ease);
}
.tl-item:hover::before{border-color:var(--accent)}
.tl-item.live::before{border-color:var(--accent);background:var(--accent)}
.tl-item.live::after{
  content:'';position:absolute;left:-1px;top:1px;
  width:26px;height:26px;
  border:2px solid var(--accent);border-radius:0;
  animation:pulse-ring 2s var(--ease) infinite;
  pointer-events:none;
}
@keyframes pulse-ring{
  0%{transform:scale(1);opacity:.6}
  100%{transform:scale(1.6);opacity:0}
}
.tl-item .years{font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
.tl-item .role{font-family:var(--font-display);font-size:clamp(17px,2.2vw,22px);letter-spacing:-0.02em;margin:2px 0 3px}
.tl-item .where{font-size:11.5px;color:var(--muted);margin-bottom:3px}
.tl-item .note{font-size:12.5px;color:var(--muted);line-height:1.6}

/* project grid */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5px}
@media(max-width:400px){.project-grid{grid-template-columns:1fr}}

/* stack grid */
.stack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5px}
.stack-group{border:1.5px solid var(--border);padding:14px}
.stack-group h3{font-size:13px;margin-bottom:6px}
.stack-group .items{font-size:12.5px;line-height:1.8}
.stack-group .note{font-size:10.5px;color:var(--muted);margin-top:6px;font-style:italic}

/* contact */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5px}
@media(max-width:600px){.contact-grid{grid-template-columns:1fr}}
.contact-grid input,.contact-grid textarea{
  display:block;width:100%;padding:11px 14px;
  background:var(--surface);border:1.5px solid var(--border);
  font:inherit;font-size:16px;color:var(--fg);
  transition:var(--dur) var(--ease);
}
.contact-grid input:focus,.contact-grid textarea:focus{border-color:var(--accent);outline:none}
.contact-grid textarea{resize:vertical;min-height:110px}
.contact-grid button{
  padding:11px 22px;border:1.5px solid var(--fg);
  background:var(--fg);color:var(--bg);
  font:inherit;font-size:12px;text-transform:uppercase;letter-spacing:0.12em;
  cursor:pointer;transition:var(--dur) var(--ease);
}
.contact-grid button:hover{background:var(--accent);border-color:var(--accent);color:var(--bg)}

/* socials */
.socials{display:flex;gap:1.5px;margin-top:20px}
.socials a{
  flex:1;display:block;padding:10px;text-align:center;
  border:1.5px solid var(--border);text-decoration:none;
  font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);
  transition:var(--dur) var(--ease);
}
.socials a:hover{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,transparent)}

/* belief lists */
.beliefs,.anti-list{margin-bottom:28px}
.beliefs li,.anti-list li{
  list-style:none;position:relative;padding:7px 0 7px 22px;
  font-size:13.5px;line-height:1.6;border-bottom:1px solid var(--border);
}
.beliefs li::before,.anti-list li::before{content:'→';position:absolute;left:0;color:var(--accent)}

/* overlays */
.overlay{
  position:fixed;inset:0;z-index:1000;
  background:oklch(0% 0 0 / 0.85);
  display:none;align-items:center;justify-content:center;
  padding:16px;
}
.overlay.open{display:flex}
.overlay-panel{
  width:100%;max-width:560px;
  background:var(--bg);border:1.5px solid var(--border);
  animation:panelIn 250ms var(--ease);
}
@keyframes panelIn{from{opacity:0;transform:scale(0.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.overlay-panel .head{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;border-bottom:1.5px solid var(--border);
}
.overlay-panel .head .prompt{color:var(--accent)}
.overlay-panel .head input{
  flex:1;background:none;border:none;outline:none;
  font:inherit;font-size:14px;color:var(--fg);
}
.overlay-panel .head input::placeholder{color:var(--muted)}
.overlay-panel .results{max-height:50vh;overflow-y:auto}
.overlay-panel .results .group-label{padding:7px 18px 3px;font-size:9px;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted)}
.overlay-panel .results .item{
  display:flex;align-items:center;gap:10px;
  padding:7px 18px;cursor:pointer;border-left:2px solid transparent;
  font-size:12.5px;color:var(--muted);transition:background 150ms,color 150ms,border-color 150ms;
}
.overlay-panel .results .item:hover,.overlay-panel .results .item.sel{
  background:color-mix(in srgb,var(--accent) 10%,transparent);
  border-left-color:var(--accent);color:var(--accent);
}
.overlay-panel .results .item .arrow{width:14px;text-align:center;flex-shrink:0}
.overlay-panel .results .item .lbl{flex:1}
.overlay-panel .results .item .hnt{font-size:9.5px;color:var(--muted);flex-shrink:0}
.overlay-panel .results .item.sel .hnt{color:color-mix(in srgb,var(--accent) 60%,transparent)}
.overlay-panel .footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 18px;border-top:1.5px solid var(--border);font-size:9.5px;color:var(--muted);
}
.overlay-panel .footer .keys{display:flex;gap:10px}
.overlay-panel .footer kbd{border:1.5px solid var(--border);padding:1px 4px;font-size:8.5px;font-family:var(--font-body)}

/* inline output */
.inline-out{padding:14px 18px;background:color-mix(in srgb,var(--accent) 6%,transparent);border-bottom:1.5px solid var(--border);font-size:13px;line-height:1.8}
.inline-out .prompt{color:var(--muted);font-weight:500;margin-bottom:3px}
.inline-out .suggest{font-size:10.5px;color:var(--muted);margin-top:6px}
.inline-out .suggest .ch{color:var(--accent)}

/* snake */
#snakeCanvas{display:block;margin:0 auto;border:1.5px solid var(--border);background:#000}
.snake-controls{text-align:center;margin-top:10px}
.snake-controls button{
  padding:7px 14px;border:1.5px solid var(--border);background:var(--bg);color:var(--fg);
  font:inherit;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;
  transition:var(--dur) var(--ease);
}
.snake-controls button:hover{border-color:var(--accent);color:var(--accent)}

/* ai items */
.ai-item{border:1.5px solid var(--border);padding:18px;margin-bottom:10px;transition:var(--dur) var(--ease)}
.ai-item:hover{border-color:var(--accent);transform:translateY(-1px)}
.ai-item .date{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.ai-item h3{font-size:17px;margin-bottom:4px}
.ai-item p{font-size:12.5px;color:var(--muted);line-height:1.6}

/* note subsist */
.sub-box{border:1.5px solid var(--border);padding:18px;text-align:center;color:var(--muted)}
.sub-box .mono{margin-bottom:6px}
.sub-box p{font-size:12.5px;margin-bottom:10px}
.sub-box form{display:flex;gap:1.5px;max-width:380px;margin:0 auto}
.sub-box input{flex:1;padding:9px 12px;border:1.5px solid var(--border);background:var(--surface);font:inherit;font-size:16px;color:var(--fg)}
.sub-box button{padding:9px 18px;border:1.5px solid var(--fg);background:var(--fg);color:var(--bg);font:inherit;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em}

/* building status */
.status-box{border:1.5px solid var(--accent);padding:18px;margin-bottom:22px}
.status-box .mono{margin-bottom:3px}
.status-box p{font-size:13.5px}

/* sidebar sticky */
.side-sticky{position:sticky;top:90px}
@media(max-width:768px){.side-sticky{position:static}}

/* at-a-glance */
.glance-box{border:1.5px solid var(--border);padding:14px;margin-top:20px}
.glance-box .mono{font-size:9.5px;margin-bottom:6px}
.glance-box .content{font-size:11.5px;line-height:2}

/* mobile menu break */
@media(max-width:768px){
  .nav{display:none}
  .hamburger{display:block}
  .header .l-wrap{flex-wrap:nowrap}
  .cmd-bar .hint{display:none}
}
</style>
</head>
<body>

<div id="progress"><div class="bar" id="progressBar"></div></div>

<header class="header">
  <div class="l-wrap">
    <a href="#home" class="brand" data-nav>
      <span class="signal"><span></span><span></span><span></span></span>
      a<span class="accent">b</span>.
    </a>
    <nav class="nav" id="mainNav">
      <a href="#home" data-nav class="active">Home</a>
      <a href="#about" data-nav>About</a>
      <a href="#cv" data-nav>CV</a>
      <a href="#work" data-nav>Work</a>
      <a href="#notes" data-nav>Notes</a>
      <a href="#building" data-nav>Building</a>
      <a href="#contact" data-nav>Contact</a>
      <a href="#ai" data-nav>AI News</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="menu"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="mobile-nav" id="mobileNav">
  <a href="#home" data-nav class="active">Home</a>
  <a href="#about" data-nav>About</a>
  <a href="#cv" data-nav>CV</a>
  <a href="#work" data-nav>Work</a>
  <a href="#notes" data-nav>Notes</a>
  <a href="#building" data-nav>Building</a>
  <a href="#contact" data-nav>Contact</a>
  <a href="#ai" data-nav>AI News</a>
</div>

<main class="l-wrap" id="app"></main>

<div class="overlay" id="palette">
  <div class="overlay-panel">
    <div class="head">
      <span class="prompt">$</span>
      <input type="text" id="paletteInput" placeholder="type a command…" autofocus spellcheck="false">
      <span class="dim" style="font-size:10.5px;letter-spacing:0.08em" id="paletteCount"></span>
    </div>
    <div id="paletteResults" class="results"></div>
    <div class="footer">
      <div class="keys">
        <span><kbd>↑↓</kbd> move</span>
        <span><kbd>↵</kbd> run</span>
        <span><kbd>esc</kbd> close</span>
      </div>
      <span>v3</span>
    </div>
  </div>
</div>

<div class="overlay" id="snakeOverlay">
  <div class="overlay-panel" style="max-width:460px">
    <div class="head">
      <span class="prompt">snake</span>

// ======================== TYPEWRITER ========================
const TYPED_PHRASES=[
  'backend · platform · rust',
  'python + some rust',
  'self-taught · riga',
  'observability > tests',
  'boring tech. intentionally.',
]
let typedIdx=0
let typedCharIdx=0
let typedDeleting=false
let typedEl=null

function initTyped(el){
  typedEl=el
  typedIdx=0;typedCharIdx=0;typedDeleting=false
  typeLoop()
}

function typeLoop(){
  if(!typedEl)return
  const phrase=TYPED_PHRASES[typedIdx]
  if(!typedDeleting){
    typedCharIdx++
    typedEl.textContent=phrase.slice(0,typedCharIdx)
    if(typedCharIdx===phrase.length){
      typedDeleting=true
      setTimeout(typeLoop,2000)
      return
    }
  }else{
    typedCharIdx--
    typedEl.textContent=phrase.slice(0,typedCharIdx)
    if(typedCharIdx===0){
      typedDeleting=false
      typedIdx=(typedIdx+1)%TYPED_PHRASES.length
    }
  }
  setTimeout(typeLoop,typedDeleting?20:60)
}

// ======================== COUNT UP ========================
let counted=false
function countStats(){
  if(counted)return
  counted=true
  const nums=document.querySelectorAll('.stat .num')
  if(!nums.length)return
  const targets=[[12,0],[12,1],[-1,2],[-1,3]]
  nums.forEach((el,i)=>{
    const t=targets[i]||[0,0]
    const val=t[0]
    if(val<0){el.classList.add('counted');return}
    if(val===12&&t[1]===1){el.textContent='12+';el.classList.add('counted');return}
    let current=0
    const step=()=>{
      if(current>=val){el.textContent=val;el.classList.add('counted');return}
      current++
      el.textContent=current
      setTimeout(step,30+Math.random()*40)
    }
    step()
  })
}

// ======================== REVEAL OBSERVER ========================
function observeReveals(){
  document.querySelectorAll('.reveal').forEach(el=>{
    if(el.classList.contains('vis'))return
    const io=new IntersectionObserver((entries,obs)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}
      })
    },{threshold:.1})
    io.observe(el)
  })
}

  overlay.classList.add('open')
  const inp=document.getElementById('paletteInput')
  inp.value=initial||''
  inp.focus()
  filterPalette()
}

function closePalette(){
  paletteOpen=false
  document.getElementById('palette').classList.remove('open')
}

function filterPalette(){
  const q=document.getElementById('paletteInput').value.toLowerCase().trim()
  let results=COMMANDS.filter(c=>{
    if(!q)return true
    const lbl=c.label.toLowerCase()
    if(lbl.includes(q))return true
    if(c.keywords)return c.keywords.some(k=>k.includes(q))
    return false
  })
  document.getElementById('paletteCount').textContent=q?results.length+' result'+(results.length!==1?'s':''):''
  const container=document.getElementById('paletteResults')
  if(!results.length){container.innerHTML='<div style="padding:28px 18px;text-align:center;font-size:12.5px;color:var(--muted)">no matches</div>';return}
  let html=''
  COMMAND_GROUPS.forEach(grp=>{
    const items=results.filter(r=>r.group===grp)
    if(!items.length)return
    html+='<div class="group-label">'+grp+'</div>'
    items.forEach((c,i)=>{
      const idx=results.indexOf(c)
      html+='<div class="item'+(idx===paletteSel?' sel':'')+'" data-idx="'+idx+'" onclick="runCommand('+idx+')" onmouseenter="paletteSel='+idx+';filterPalette()"><span class="arrow">'+c.arrow+'</span><span class="lbl">'+c.label+'</span><span class="hnt">'+c.hint+'</span></div>'
    })
  })
  container.innerHTML=html
  // scroll selected into view
  const sel=container.querySelector('.sel')
  if(sel)sel.scrollIntoView({block:'nearest'})
}

function runCommand(idx){
  const results=filteredResults()
  if(results[idx])results[idx].action()
}

function filteredResults(){
  const q=document.getElementById('paletteInput').value.toLowerCase().trim()
  return COMMANDS.filter(c=>{
    if(!q)return true
    const lbl=c.label.toLowerCase()
    if(lbl.includes(q))return true
    if(c.keywords)return c.keywords.some(k=>k.includes(q))
    return false
  })
}

// ======================== MOBILE NAV ========================
function openMobileNav(){
  document.getElementById('mobileNav').classList.add('open')
  document.getElementById('hamburger').classList.add('open')
}
function closeMobileNav(){
  document.getElementById('mobileNav').classList.remove('open')

// ======================== SNAKE ========================
let snakeState=null,snakeAnim=null

function openSnake(){
  closePalette()
  document.getElementById('snakeOverlay').classList.add('open')
  if(!snakeState)initSnake()
  drawSnake()
}

function closeSnake(){
  document.getElementById('snakeOverlay').classList.remove('open')
  if(snakeAnim){clearTimeout(snakeAnim);snakeAnim=null}
}

function initSnake(){
  const grid=20,cell=20
  snakeState={grid,cell,dir:'right',nextDir:'right',snake:[{x:10,y:10},{x:9,y:10},{x:8,y:10}],food:{x:15,y:10},score:0,gameOver:false,paused:false}
  placeFood()
}

function placeFood(){
  if(!snakeState)return
  const{grid,snake}=snakeState
  let pos
  do{pos={x:Math.floor(Math.random()*grid),y:Math.floor(Math.random()*grid)}}while(snake.some(s=>s.x===pos.x&&s.y===pos.y))
  snakeState.food=pos
}

function stepSnake(){
  const s=snakeState
  if(!s||s.gameOver||s.paused)return
  s.dir=s.nextDir
  const head={x:s.snake[0].x,y:s.snake[0].y}
  switch(s.dir){case'up':head.y--;break;case'down':head.y++;break;case'left':head.x--;break;case'right':head.x++;break}
  if(head.x<0||head.x>=s.grid||head.y<0||head.y>=s.grid||s.snake.some(p=>p.x===head.x&&p.y===head.y)){s.gameOver=true;drawSnake();return}
  s.snake.unshift(head)
  const ate=head.x===s.food.x&&head.y===s.food.y
  if(ate){s.score++;placeFood()}else s.snake.pop()
  drawSnake(ate)
  const speed=Math.max(50,150-s.score)
  snakeAnim=setTimeout(stepSnake,speed)
}

function drawSnake(ate){
  const s=snakeState
  if(!s)return
  const canvas=document.getElementById('snakeCanvas')
  const ctx=canvas.getContext('2d')
  const size=s.grid*s.cell
  ctx.fillStyle='#000';ctx.fillRect(0,0,size,size)
  ctx.strokeStyle='#111';ctx.lineWidth=0.5
  for(let i=0;i<=s.grid;i++){ctx.beginPath();ctx.moveTo(i*s.cell,0);ctx.lineTo(i*s.cell,size);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*s.cell);ctx.lineTo(size,i*s.cell);ctx.stroke()}
  // food glow
  if(ate){
    const grd=ctx.createRadialGradient(s.food.x*s.cell+s.cell/2,s.food.y*s.cell+s.cell/2,2,s.food.x*s.cell+s.cell/2,s.food.y*s.cell+s.cell/2,s.cell)
    grd.addColorStop(0,'rgba(255,255,255,0.3)');grd.addColorStop(1,'transparent')
    ctx.fillStyle=grd;ctx.fillRect(s.food.x*s.cell-s.cell/2,s.food.y*s.cell-s.cell/2,s.cell*2,s.cell*2)
  }
  // snake
  s.snake.forEach((p,i)=>{
    ctx.fillStyle=i===0?'#2a9d8f':'oklch(55% 0.14 190 / 0.4)'
    ctx.fillRect(p.x*s.cell+1,p.y*s.cell+1,s.cell-2,s.cell-2)
    if(i===0&&!s.gameOver){
      ctx.shadowColor='#2a9d8f';ctx.shadowBlur=6
      ctx.fillRect(p.x*s.cell+1,p.y*s.cell+1,s.cell-2,s.cell-2)
      ctx.shadowBlur=0
    }
  })
  // food
  ctx.fillStyle='#fff';ctx.fillRect(s.food.x*s.cell+4,s.food.y*s.cell+4,s.cell-8,s.cell-8)
  if(s.gameOver){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,size/2-18,size,36)
    ctx.fillStyle='#2a9d8f';ctx.font='15px monospace';ctx.textAlign='center'
    ctx.fillText('game over — '+(snakeState?s.score:'0'),size/2,size/2+5)
  }
  document.getElementById('snakeScore').textContent='score: '+s.score
}

// ======================== EVENT BINDING ========================
document.addEventListener('DOMContentLoaded',()=>{
  if(location.hash){const p=location.hash.slice(1);if(p&&['home','about','cv','work','notes','building','contact','ai'].includes(p))currentPage=p}
  navigate(currentPage)

  // palette input
  document.getElementById('paletteInput').addEventListener('input',()=>{paletteSel=0;filterPalette()})
  document.getElementById('paletteInput').addEventListener('keydown',e=>{
    if(e.key==='Escape'){e.preventDefault();closePalette()}
    if(e.key==='ArrowDown'){e.preventDefault();paletteSel=Math.min(paletteSel+1,COMMANDS.length-1);filterPalette()}
    if(e.key==='ArrowUp'){e.preventDefault();paletteSel=Math.max(paletteSel-1,0);filterPalette()}
    if(e.key==='Enter'){e.preventDefault();runCommand(paletteSel)}
  })

  // nav click handlers (explicit, not relying on hashchange)
  document.querySelectorAll('[data-nav]').forEach(a=>{
    a.addEventListener('click',e=>{
      e.preventDefault()
      const p=a.getAttribute('href').slice(1)
      if(p&&['home','about','cv','work','notes','building','contact','ai'].includes(p)){
        navigate(p)
      }
    })
  })

  // hamburger
  document.getElementById('hamburger').addEventListener('click',e=>{
    e.stopPropagation()
    const nav=document.getElementById('mobileNav')
    const open=!nav.classList.contains('open')
    if(open)openMobileNav();else closeMobileNav()
  })
  // mobile nav links close nav + nav handles via [data-nav] click delegation
  document.querySelectorAll('#mobileNav a').forEach(a=>a.addEventListener('click',closeMobileNav))

  // global keyboard
  document.addEventListener('keydown',e=>{
    if(paletteOpen){
      if(e.key==='Escape'&&!snakeState?.gameOver)closePalette()
      return
    }
    const isEditable=e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)
    if(isEditable)return
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openPalette()}
    if(e.key==='/'){e.preventDefault();openPalette()}
    if(e.key==='Escape')closeSnake()
    if(document.getElementById('snakeOverlay').classList.contains('open')&&snakeState&&!snakeState.gameOver){
      const dirs={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'}
      const nd=dirs[e.key]
      if(nd){
        e.preventDefault()
        if((snakeState.dir==='up'&&nd==='down')||(snakeState.dir==='down'&&nd==='up')||(snakeState.dir==='left'&&nd==='right')||(snakeState.dir==='right'&&nd==='left'))return
        snakeState.nextDir=nd
        if(!snakeAnim&&!snakeState.gameOver)snakeAnim=setTimeout(stepSnake,0)
      }
    }
  })

  // snake
  document.getElementById('snakeRestart').addEventListener('click',()=>{if(snakeAnim){clearTimeout(snakeAnim);snakeAnim=null}initSnake();drawSnake()})
  document.getElementById('snakeClose2').addEventListener('click',closeSnake)
  document.getElementById('snakeOverlay').addEventListener('mousedown',e=>{if(e.target===e.currentTarget)closeSnake()})
  document.getElementById('palette').addEventListener('mousedown',e=>{if(e.target===e.currentTarget)closePalette()})
})

window.addEventListener('hashchange',()=>{
  const p=location.hash.slice(1)
  if(p&&['home','about','cv','work','notes','building','contact','ai'].includes(p)){
    navigate(p)
  }
})
</script>
