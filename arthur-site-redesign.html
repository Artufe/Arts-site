<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Arthur Buikis — ab.</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:      oklch(96% 0.004 100);
  --surface: oklch(99.5% 0.002 100);
  --fg:      oklch(15% 0.02 100);
  --muted:   oklch(42% 0.015 100);
  --border:  oklch(15% 0.02 100);
  --accent:  oklch(57% 0.20 18);
  --dot:     oklch(0% 0 0 / 0.045);
  --scan:    oklch(0% 0 0 / 0.03);
  --font-display: 'Times New Roman', 'Iowan Old Style', Georgia, serif;
  --font-body:    ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', Menlo, monospace;
  --dur: 200ms;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:      oklch(10% 0.008 100);
    --surface: oklch(7% 0.008 100);
    --fg:      oklch(92% 0.004 100);
    --muted:   oklch(58% 0.01 100);
    --border:  oklch(92% 0.004 100);
    --accent:  oklch(62% 0.22 25);
    --dot:     oklch(100% 0 0 / 0.035);
    --scan:    oklch(100% 0 0 / 0.015);
  }
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--fg);
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  background-image:radial-gradient(var(--dot) 1px,transparent 0);
  background-size:24px 24px;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);
  pointer-events:none;z-index:9999;
}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border)}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* layout */
.l-wrap{max-width:1200px;margin:0 auto;padding:0 32px}
.l-asym{display:grid;grid-template-columns:3fr 1fr;gap:64px}
@media(max-width:900px){.l-asym{grid-template-columns:1fr;gap:40px}.l-wrap{padding:0 20px}}

/* header */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:2px solid var(--border);
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  height:56px;max-width:1200px;margin:0 auto;padding:0 32px;
}
.brand{
  font-family:var(--font-display);font-size:26px;
  font-weight:400;line-height:1;letter-spacing:-0.02em;
  color:var(--fg);text-decoration:none;position:relative;
}
.brand:hover{color:var(--accent)}
.brand .accent{color:var(--accent)}

/* desktop nav */
.nav{display:flex;gap:2px;align-items:center}
.nav a{
  font-size:11px;text-transform:uppercase;letter-spacing:0.14em;
  color:var(--muted);text-decoration:none;
  padding:8px 14px;border:1.5px solid transparent;
  transition:var(--dur);line-height:1;white-space:nowrap;
}
.nav a:hover,.nav a.active{border-color:var(--fg);color:var(--fg)}
.nav a.active{background:var(--fg);color:var(--bg)}

/* hamburger */
.hamburger{display:none;background:none;border:1.5px solid var(--muted);color:var(--fg);width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;transition:var(--dur);font-size:18px;line-height:1;padding:0}
.hamburger:hover{border-color:var(--accent);color:var(--accent)}

/* mobile nav overlay */
.mob-nav{
  position:fixed;z-index:200;inset:0;
  background:var(--bg);
  display:none;flex-direction:column;justify-content:center;align-items:center;
  gap:4px;padding:32px;
}
.mob-nav.open{display:flex}
.mob-nav a{
  font-family:var(--font-display);
  font-size:clamp(28px,6vw,48px);
  font-weight:400;letter-spacing:-0.03em;
  color:var(--muted);text-decoration:none;
  padding:8px 0;transition:var(--dur);
}
.mob-nav a:hover,.mob-nav a.active{color:var(--accent)}
.mob-nav .close-mob{
  position:absolute;top:16px;right:20px;
  background:none;border:1.5px solid var(--muted);
  color:var(--fg);width:44px;height:44px;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* pages */
.page{padding:48px 0 80px;animation:fadeIn 250ms ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* typography */
h1{
  font-family:var(--font-display);
  font-size:clamp(52px,10vw,140px);
  font-weight:400;line-height:0.88;
  letter-spacing:-0.045em;
  margin:0 0 12px;
}
h2{
  font-family:var(--font-display);
  font-size:clamp(30px,5vw,60px);
  font-weight:400;line-height:1;
  letter-spacing:-0.035em;
  margin:0 0 20px;
}
h3{
  font-family:var(--font-display);
  font-size:22px;font-weight:400;
  letter-spacing:-0.02em;margin:0 0 10px;
}
.mono{font-family:var(--font-body);font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted)}
.ch{color:var(--accent)}
.dim{color:var(--muted)}
.tnum{font-variant-numeric:tabular-nums}

/* section header */
.section-header{display:flex;align-items:baseline;gap:12px;margin-bottom:24px}
.section-header h2{flex:1}
.section-header .count{font-size:10px;color:var(--muted);letter-spacing:0.12em;white-space:nowrap;font-family:var(--font-body)}

/* command bar */
.cmd-bar{
  margin:24px 0 36px;
  border:2px solid var(--border);
  padding:14px 18px;
  display:flex;align-items:center;gap:10px;
  cursor:text;transition:var(--dur);
}
.cmd-bar:hover,.cmd-bar:focus-within{border-color:var(--accent)}
.cmd-bar .prompt{color:var(--accent);font-size:13px}
.cmd-bar .placeholder{flex:1;color:var(--muted);font-size:13px;user-select:none}
.cmd-bar .hint{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.14em;white-space:nowrap;opacity:0.6}

/* cards */
.card{border:2px solid var(--border);padding:20px;margin-bottom:12px;transition:var(--dur)}
.card:hover{border-color:var(--accent)}
.card .meta{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px}
.card h3{margin-bottom:6px;font-size:20px}
.card h3 .link-arrow{color:var(--accent);font-size:13px;text-decoration:none}
.card p{font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.6}
.card .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.card .tag{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;padding:3px 8px;border:1.5px solid var(--border);color:var(--muted)}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:40px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{border:2px solid var(--border);padding:20px 12px;text-align:center}
.stat .num{font-family:var(--font-display);font-size:clamp(28px,4vw,44px);font-weight:400;letter-spacing:-0.03em;color:var(--accent);line-height:1;margin-bottom:2px}
.stat .lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted)}

/* timeline */
.tl{position:relative}
.tl::before{content:'';position:absolute;left:10px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;padding:0 0 28px 36px}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:'';position:absolute;left:3px;top:5px;width:16px;height:16px;border:2px solid var(--border);background:var(--bg)}
.tl-item.live::before{border-color:var(--accent);background:var(--accent)}
.tl-item .years{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)}
.tl-item .role{font-family:var(--font-display);font-size:clamp(17px,2.5vw,22px);letter-spacing:-0.02em;margin:2px 0 4px}
.tl-item .where{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.tl-item .note{font-size:13px;color:var(--muted);line-height:1.6}

/* project grid */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2px}
@media(max-width:400px){.project-grid{grid-template-columns:1fr}}

/* stack grid */
.stack-grid{display:grid;grid-template-columns:1fr;gap:2px}
.stack-group{border:2px solid var(--border);padding:14px 16px}
.stack-group h3{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.stack-group .items{font-size:13px;line-height:1.9}
.stack-group .note{font-size:10px;color:var(--muted);margin-top:6px;font-style:italic}

/* contact */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
@media(max-width:600px){.contact-grid{grid-template-columns:1fr}}
.contact-grid input,.contact-grid textarea{
  display:block;width:100%;padding:12px 14px;
  background:var(--surface);border:2px solid var(--border);
  font:inherit;font-size:13px;color:var(--fg);-webkit-appearance:none;border-radius:0;
}
.contact-grid input:focus,.contact-grid textarea:focus{border-color:var(--accent);outline:none}
.contact-grid textarea{resize:vertical;min-height:120px}
.contact-grid button{
  padding:12px 24px;border:2px solid var(--fg);background:var(--fg);color:var(--bg);
  font:inherit;font-size:12px;text-transform:uppercase;letter-spacing:0.14em;
  cursor:pointer;transition:var(--dur);-webkit-appearance:none;border-radius:0;
}
.contact-grid button:hover{background:var(--accent);border-color:var(--accent);color:var(--bg)}

/* socials */
.socials{display:flex;gap:2px;margin-top:20px}
.socials a{
  flex:1;display:block;padding:12px 8px;text-align:center;
  border:2px solid var(--border);text-decoration:none;
  font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);
  transition:var(--dur);
}
.socials a:hover{border-color:var(--accent);color:var(--accent)}

/* belief / anti */
.beliefs,.anti-list{margin-bottom:28px}
.beliefs li,.anti-list li{
  list-style:none;position:relative;padding:8px 0 8px 22px;
  font-size:14px;line-height:1.6;border-bottom:1px solid var(--border);
}
.beliefs li::before,.anti-list li::before{content:'→';position:absolute;left:0;color:var(--accent)}
.anti-list li::before{content:'✕';font-size:12px}

/* overlays */
.overlay{
  position:fixed;inset:0;z-index:1000;
  background:oklch(0% 0 0 / 0.88);
  display:none;align-items:center;justify-content:center;
  padding:16px;
}
.overlay.open{display:flex}
.overlay-panel{
  width:100%;max-width:560px;
  background:var(--bg);border:2px solid var(--border);
  max-height:90vh;display:flex;flex-direction:column;
}
.overlay-panel .head{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;border-bottom:2px solid var(--border);flex-shrink:0;
}
.overlay-panel .head .prompt{color:var(--accent);font-size:14px;flex-shrink:0}
.overlay-panel .head input{
  flex:1;background:none;border:none;outline:none;
  font:inherit;font-size:14px;color:var(--fg);min-width:0;
}
.overlay-panel .head input::placeholder{color:var(--muted)}
.overlay-panel .head .count{font-size:10px;color:var(--muted);letter-spacing:0.1em;flex-shrink:0}
.overlay-panel .results{overflow-y:auto;flex:1}
.overlay-panel .results .group-label{padding:8px 18px 4px;font-size:8px;text-transform:uppercase;letter-spacing:0.25em;color:var(--muted)}
.overlay-panel .results .item{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px;cursor:pointer;
  border-left:2px solid transparent;
  font-size:13px;color:var(--muted);
}
.overlay-panel .results .item.sel,.overlay-panel .results .item:hover{
  background:color-mix(in srgb,var(--accent) 8%,transparent);
  border-left-color:var(--accent);color:var(--fg);
}
.overlay-panel .results .item .arrow{width:14px;text-align:center;flex-shrink:0}
.overlay-panel .results .item .lbl{flex:1}
.overlay-panel .results .item .hnt{font-size:9px;color:var(--muted)}
.overlay-panel .results .item.sel .hnt{color:color-mix(in srgb,var(--accent) 60%,transparent)}
.overlay-panel .footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 18px;border-top:2px solid var(--border);
  font-size:9px;color:var(--muted);flex-shrink:0;
}
.overlay-panel .footer .keys{display:flex;gap:10px}
.overlay-panel .footer kbd{border:1.5px solid var(--border);padding:2px 5px;font-size:8px;font-family:var(--font-body);line-height:1}
.inline-out{padding:14px 18px;background:color-mix(in srgb,var(--accent) 6%,transparent);border-bottom:2px solid var(--border);font-size:13px;line-height:1.8}
.inline-out .prompt{color:var(--muted);font-weight:500;margin-bottom:4px;font-size:11px;letter-spacing:0.06em}
.inline-out .suggest{margin-top:6px;font-size:10px;color:var(--muted)}
.inline-out .suggest .ch{color:var(--accent)}

/* snake */
#snakeCanvas{display:block;margin:0 auto;border:2px solid var(--border);background:#000;max-width:100%}
.snake-controls{text-align:center;margin-top:10px}
.snake-controls button{
  padding:8px 16px;border:2px solid var(--border);background:var(--bg);color:var(--fg);
  font:inherit;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;
}
.snake-controls button:hover{border-color:var(--accent);color:var(--accent)}

/* ai news */
.ai-item{border:2px solid var(--border);padding:18px;margin-bottom:10px}
.ai-item .date{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.ai-item h3{font-size:17px;margin-bottom:4px}
.ai-item p{font-size:13px;color:var(--muted);line-height:1.6}

/* mobile tweaks */
@media(max-width:768px){
  .header-inner{padding:0 20px;height:50px}
  .nav{display:none}
  .hamburger{display:flex}
  .page{padding:32px 0 64px}
  .cmd-bar .hint{display:none}
  .stats{grid-template-columns:repeat(2,1fr)}
  .project-grid{grid-template-columns:1fr}
  .overlay{padding:8px}
  .overlay-panel{max-width:100%;max-height:100vh}
  .contact-grid input,.contact-grid textarea,.contact-grid button{font-size:16px}
}
@media(max-width:480px){
  .stat{padding:14px 8px}
  h1{font-size:clamp(40px,12vw,52px)}
  .card{padding:14px}
  .tl-item{padding:0 0 20px 32px}
  .tl-item::before{left:2px;top:4px;width:14px;height:14px}
  .tl::before{left:9px}
}

/* blink cursor */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor-blink::after{content:'▊';color:var(--accent);animation:blink 1s step-end infinite;margin-left:2px}

/* helper */
.sticky-side{position:sticky;top:88px}
@media(max-width:900px){.sticky-side{position:static}}
</style>
</head>

const SITE={name:'Arthur Buikis',email:'arthur@buikis.com',url:'https://arthur.buikis.com',brand:'ab.',description:'Senior full-stack engineer. Ships systems that hold up.',formspree:'https://formspree.io/f/xaqadvlz',socials:[{label:'GitHub',href:'https://github.com/Artufe'},{label:'LinkedIn',href:'https://www.linkedin.com/in/arthur-buikis-002145151/'},{label:'Upwork',href:'https://www.upwork.com/freelancers/abuikis'}],bio:{jobTitle:'Senior software engineer',location:{city:'Riga',country:'LV',timezone:'Europe/Riga'},summary:'Backend and platform engineer based in Riga. Around twelve years in Python with Rust (PyO3) for hot paths. Currently working on a media-processing platform.',knowsAbout:['Python','Rust','PyO3','Celery','Kubernetes','Postgres','Backend engineering','Platform engineering','Performance engineering','Data infrastructure','Web scraping','Machine learning systems']}};

function renderAINews(){return`<div class="page"><div class="section-header"><h2>AI &middot; ML in production</h2><div class="count">perspective</div></div><div class="l-asym"><div><p style="font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.7">Short, opinionated notes on AI/ML in production — the unglamorous side: cost, latency, failure modes, what actually works at scale. Not prompt-tip threads, not "agents will replace…" speculation. The senior engineer's read.</p><div class="ai-item"><div class="date">2026-04-28</div><h3>Why most AI demos don't ship</h3><p>The gap between a Jupyter notebook and a production pipeline isn't engineering — it's cost, latency, and the ten systems around the model that need to never break. I've been on both sides.</p></div><div class="ai-item"><div class="date">coming</div><h3>ML pipeline integration patterns</h3><p>Shadow deploys, safe rollouts, feature flags for models. What I've learned integrating 12+ ML clients into a single production pipeline.</p></div><div class="ai-item"><div class="date">coming</div><h3>PyO3 in production ML</h3><p>When Rust earns its keep in a Python ML stack. Graph reads, ETA engine, and releasing the GIL — the patterns that work and the ones that don't.</p></div></div><div><div class="sticky-side"><div style="border:2px solid var(--border);padding:14px;margin-bottom:10px"><div class="mono" style="margin-bottom:4px;font-size:9px">currently</div><p style="font-size:13px">Integrating ML processing clients into production: pano enhancement, sky replacement, monodepth, POI detection, and more. Each touches the job schema, the graph engine, and k8s.</p></div><div style="border:2px solid var(--border);padding:14px"><div class="mono" style="margin-bottom:4px;font-size:9px">stack</div><p style="font-size:13px;line-height:2">Triton Inference Server<br>Shadow deploys · rollouts<br>Postgres · ClickHouse<br>Kubernetes · Kueue</p></div></div></div></div></div>`}
let paletteOpen=false,paletteSel=0;
function openPalette(initial){if(paletteOpen)return;paletteOpen=true;paletteSel=0;document.getElementById('palette').classList.add('open');const inp=document.getElementById('paletteInput');inp.value=initial||'';setTimeout(()=>inp.focus(),50);filterPalette()}
function closePalette(){paletteOpen=false;document.getElementById('palette').classList.remove('open')}
function filterPalette(){const q=document.getElementById('paletteInput').value.toLowerCase().trim();let results=COMMANDS.filter(c=>{if(!q)return true;const lbl=c.label.toLowerCase();if(lbl.includes(q))return true;if(c.keywords)return c.keywords.some(k=>k.includes(q));return false});document.getElementById('paletteCount').textContent=q?results.length+' result'+(results.length!==1?'s':''):'';const container=document.getElementById('paletteResults');if(!results.length){container.innerHTML='<div style="padding:24px 20px;text-align:center;font-size:12px;color:var(--muted)">no matches</div>';return}let html='';COMMAND_GROUPS.forEach(grp=>{const items=results.filter(r=>r.group===grp);if(!items.length)return;html+='<div class="group-label">'+grp+'</div>';items.forEach(c=>{const idx=results.indexOf(c);html+='<div class="item'+(idx===paletteSel?' sel':'')+'" data-idx="'+idx+'" onclick="runCommand('+idx+')" onmouseenter="paletteSel='+idx+';filterPalette()"><span class="arrow">'+c.arrow+'</span><span class="lbl">'+c.label+'</span><span class="hnt">'+c.hint+'</span></div>'})});container.innerHTML=html;const sel=container.querySelector('.sel');if(sel)sel.scrollIntoView({block:'nearest'})}
function runCommand(idx){const q=document.getElementById('paletteInput').value.toLowerCase().trim();const results=COMMANDS.filter(c=>{if(!q)return true;const lbl=c.label.toLowerCase();if(lbl.includes(q))return true;if(c.keywords)return c.keywords.some(k=>k.includes(q));return false});if(results[idx])results[idx].action()}

let snakeState=null,snakeAnim=null;
function openSnake(){closePalette();document.getElementById('snakeOverlay').classList.add('open');if(!snakeState)initSnake();drawSnake()}
function closeSnake(){document.getElementById('snakeOverlay').classList.remove('open');if(snakeAnim){clearTimeout(snakeAnim);snakeAnim=null}}
function initSnake(){const g=20,c=20;snakeState={grid:g,cell:c,dir:'right',nextDir:'right',snake:[{x:10,y:10},{x:9,y:10},{x:8,y:10}],food:{x:15,y:10},score:0,gameOver:false,paused:false};placeFood()}
function placeFood(){if(!snakeState)return;const{grid,snake}=snakeState;let p;do{p={x:Math.floor(Math.random()*grid),y:Math.floor(Math.random()*grid)}}while(snake.some(s=>s.x===p.x&&s.y===p.y));snakeState.food=p}
function stepSnake(){const s=snakeState;if(!s||s.gameOver||s.paused)return;s.dir=s.nextDir;const h={x:s.snake[0].x,y:s.snake[0].y};switch(s.dir){case'up':h.y--;break;case'down':h.y++;break;case'left':h.x--;break;case'right':h.x++;break}if(h.x<0||h.x>=s.grid||h.y<0||h.y>=s.grid||s.snake.some(p=>p.x===h.x&&p.y===h.y)){s.gameOver=true;drawSnake();return}s.snake.unshift(h);if(h.x===s.food.x&&h.y===s.food.y){s.score++;placeFood()}else s.snake.pop();drawSnake();snakeAnim=setTimeout(stepSnake,Math.max(50,160-s.score))}
function drawSnake(){const s=snakeState;if(!s)return;const c=document.getElementById('snakeCanvas'),ctx=c.getContext('2d'),sz=s.grid*s.cell;ctx.fillStyle='#000';ctx.fillRect(0,0,sz,sz);ctx.strokeStyle='#151515';ctx.lineWidth=0.5;for(let i=0;i<=s.grid;i++){ctx.beginPath();ctx.moveTo(i*s.cell,0);ctx.lineTo(i*s.cell,sz);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*s.cell);ctx.lineTo(sz,i*s.cell);ctx.stroke()}s.snake.forEach((p,i)=>{ctx.fillStyle=i===0?'var(--accent)':'oklch(60% 0.22 25 / 0.35)';ctx.fillRect(p.x*s.cell+1,p.y*s.cell+1,s.cell-2,s.cell-2)});ctx.fillStyle='#fff';ctx.fillRect(s.food.x*s.cell+4,s.food.y*s.cell+4,s.cell-8,s.cell-8);if(s.gameOver){ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,sz/2-18,sz,36);ctx.fillStyle='var(--accent)';ctx.font='14px monospace';ctx.textAlign='center';ctx.fillText('game over · '+(snakeState?s.score:'0'),sz/2,sz/2+5)}document.getElementById('snakeScore').textContent=s.score}
document.addEventListener('DOMContentLoaded',()=>{
  if(location.hash){const p=location.hash.slice(1);if(p&&['home','about','cv','work','notes','building','contact','ai'].includes(p))currentPage=p}
  navigate(currentPage);
  // palette
  const pInp=document.getElementById('paletteInput');
  pInp.addEventListener('input',()=>{paletteSel=0;filterPalette()});
  pInp.addEventListener('keydown',e=>{
    if(e.key==='Escape'){e.preventDefault();closePalette()}
    if(e.key==='ArrowDown'){e.preventDefault();paletteSel=Math.min(paletteSel+1,COMMANDS.length-1);filterPalette()}
    if(e.key==='ArrowUp'){e.preventDefault();paletteSel=Math.max(paletteSel-1,0);filterPalette()}
    if(e.key==='Enter'){e.preventDefault();runCommand(paletteSel)}
  });
  // global keys
  document.addEventListener('keydown',e=>{
    if(paletteOpen){if(e.key==='Escape')closePalette();return}
    const ed=e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable);
    if(ed)return;
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openPalette()}
    if(e.key==='/'){e.preventDefault();openPalette()}
    if(e.key==='Escape')closeSnake();
    // snake keys
    if(document.getElementById('snakeOverlay').classList.contains('open')&&snakeState&&!snakeState.gameOver){
      const dirs={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
      const nd=dirs[e.key];
      if(nd){e.preventDefault();const o=snakeState.dir;if((o==='up'&&nd==='down')||(o==='down'&&nd==='up')||(o==='left'&&nd==='right')||(o==='right'&&nd==='left'))return;snakeState.nextDir=nd;if(!snakeAnim){snakeAnim=setTimeout(stepSnake,0)}}
    }
  });
  // hamburger
  document.getElementById('hamburgerBtn').addEventListener('click',()=>document.getElementById('mobNav').classList.toggle('open'));
  document.getElementById('closeMobBtn').addEventListener('click',closeMobNav);
  document.getElementById('mobNav').addEventListener('mousedown',e=>{if(e.target===e.currentTarget)closeMobNav()});
  // snake
  document.getElementById('snakeRestart').addEventListener('click',()=>{if(snakeAnim){clearTimeout(snakeAnim);snakeAnim=null}initSnake();drawSnake()});
  document.getElementById('snakeClose2').addEventListener('click',closeSnake);
  document.getElementById('snakeOverlay').addEventListener('mousedown',e=>{if(e.target===e.currentTarget)closeSnake()});
  document.getElementById('palette').addEventListener('mousedown',e=>{if(e.target===e.currentTarget)closePalette()});
  // mobile nav links
  document.querySelectorAll('[data-mob]').forEach(a=>a.addEventListener('click',closeMobNav));
});
window.addEventListener('hashchange',()=>{
  const p=location.hash.slice(1);
  if(p&&['home','about','cv','work','notes','building','contact','ai'].includes(p)){currentPage=p;render();updateNav();closeMobNav()}
});
</script>
</body>
